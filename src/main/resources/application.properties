spring.application.name=QueryMind

# Server Configuration
server.port=8080
server.servlet.context-path=/querymind
server.error.include-message=always
server.error.include-stacktrace=never

# Database Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# H2 Database (Development)
spring.datasource.url=jdbc:h2:mem:queryminddb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# QueryMind Configuration
querymind.ai-api-key=${AI_API_KEY:your-openai-api-key-here}
querymind.ai-provider=openai
querymind.ai-model=gpt-4
querymind.max-tokens=2000
querymind.temperature=0.7

# Logging Configuration
logging.level.root=INFO
logging.level.com.querymind=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

